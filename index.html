<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - chats</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 2rem; border-radius: 12px; width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #58a6ff; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; border: none; color: white; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .btn-msg { background: #1f6feb; }
        .btn-logout { background: #da3633; font-size: 0.8em; margin-top: 20px; }
        .hidden { display: none; }
        #status { font-size: 0.8em; text-align: center; color: #8b949e; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card" id="auth-section">
    <h2>Sistema de chat privado</h2>
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <button onclick="register()" style="background: #30363d;">Registrarse</button>
</div>

<div class="card hidden" id="control-section">
    <div id="status">Conectado como: <span id="user-display"></span></div>
    <h2>Panel de Control</h2>
    
    <label>Grupo / Sala:</label>
    <select id="grupo-selector">
        <option value="sala1">Sala Principal</option>
        <option value="sala2">Laboratorio</option>
    </select>

    <input type="text" id="mensaje-txt" placeholder="Escribe un comando...">
    <button class="btn-msg" onclick="enviarMensaje()">Enviar al ESP32</button>
    
    <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
</div>

<script>
    // --- CONFIGURACIÓN DE FIREBASE (Datos de tu imagen) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDQsR_8LiEcPY5bGsX7FRqpfqgfcqibNEE",
        authDomain: "iot-pro-d8252.firebaseapp.com",
        projectId: "iot-pro-d8252",
        storageBucket: "iot-pro-d8252.firebasestorage.app",
        messagingSenderId: "306485168047",
        appId: "1:306485168047:web:4cd19e65e662d45be8d15a",
        measurementId: "G-30VLNJDDJ9"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // --- CONFIGURACIÓN MQTT (EMQX) ---
    const mqtt_url = "wss://z0cf7c36.ala.us-east-1.emqxsl.com:8084/mqtt";
    const mqtt_options = {
        username: "esp32", 
        password: "1234",
        clientId: "Web_" + Math.random().toString(16).substr(2, 5)
    };
    const client = mqtt.connect(mqtt_url, mqtt_options);

    // --- LÓGICA DE USUARIOS ---
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('control-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = user.email;
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('control-section').classList.add('hidden');
        }
    });

    function login() {
        const usuario = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const correoFalso = usuario + "@sistema.local";
        auth.signInWithEmailAndPassword(correoFalso, p).catch(err => alert("Usuario o clave incorrecta"));
    }

    function register() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        auth.createUserWithEmailAndPassword(e, p).then(() => alert("¡Cuenta creada!")).catch(err => alert(err.message));
    }

    function logout() { auth.signOut(); }

    // --- ENVÍO AL ESP32 ---
    function enviarMensaje() {
        const sala = document.getElementById('grupo-selector').value;
        const msg = sala + '|' + document.getElementById('mensaje-txt').value;
        const topico = "proyecto/chat/" + sala + "/coman"; // Tópico con tu nueva división
        
        if(msg.trim() !== "") {
            client.publish(topico, msg);
            alert("Comando enviado!");
            document.getElementById('mensaje-txt').value = "";
        }
    }
</script>
</body>
</html>
