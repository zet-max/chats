<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - chats</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #58a6ff; margin-top: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #238636; border: none; color: white; cursor: pointer; border-radius: 6px; font-weight: bold; margin-top: 10px; }
        .btn-msg { background: #1f6feb; }
        .btn-logout { background: #da3633; font-size: 0.85em; margin-top: 25px; }
        .hidden { display: none; }
        #status-bar { font-size: 0.8em; text-align: center; color: #8b949e; background: #0d1117; padding: 5px; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card" id="auth-section">
    <h2>Sistema Zaeth</h2>
    <input type="text" id="username" placeholder="Nombre de usuario (ej: panda)">
    <input type="password" id="password" placeholder="Tu clave secreta">
    <button onclick="acceder()">Entrar</button>
    <button onclick="nuevoUsuario()" style="background: #30363d;">Registrar Nuevo</button>
</div>

<div class="card hidden" id="control-section">
    <div id="status-bar">👤 Usuario: <span id="user-display"></span></div>
    <h2>Panel de Control</h2>
    
    <label>Ubicación:</label>
    <select id="grupo-selector">
        <option value="sala1">Sala Principal</option>
        <option value="sala2">Laboratorio</option>
    </select>

    <input type="text" id="mensaje-txt" placeholder="Escribe comando...">
    <button class="btn-msg" onclick="enviarMensaje()">Enviar al Mega</button>
    
    <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión / Cambiar Usuario</button>
</div>

<script>
    // Configuración con tus datos de imagen
    const firebaseConfig = {
        apiKey: "AIzaSyDQsR_8LiEcPY5bGsX7FRqpfqgfcqibNEE",
        authDomain: "iot-pro-d8252.firebaseapp.com",
        projectId: "iot-pro-d8252",
        storageBucket: "iot-pro-d8252.firebasestorage.app",
        messagingSenderId: "306485168047",
        appId: "1:306485168047:web:4cd19e65e662d45be8d15a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // MQTT
    const client = mqtt.connect("wss://z0cf7c36.ala.us-east-1.emqxsl.com:8084/mqtt", {
        username: "esp32", password: "1234",
        clientId: "Web_" + Math.random().toString(16).substr(2, 5)
    });

    // --- EL TRUCO DEL NOMBRE DE USUARIO ---
    function transformarUser(u) { return u.trim().toLowerCase() + "@zaeth.local"; }

    // --- LÓGICA DE ESTADO (Detecta si hay alguien dentro) ---
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('control-section').classList.remove('hidden');
            // Le quitamos el "@zaeth.local" para mostrar solo el nombre
            document.getElementById('user-display').innerText = user.email.split('@')[0];
        } else {
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('control-section').classList.add('hidden');
        }
    });

    function acceder() {
        const u = transformarUser(document.getElementById('username').value);
        const p = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(u, p).catch(err => alert("Error: Usuario o clave incorrectos"));
    }

    function nuevoUsuario() {
        const u = transformarUser(document.getElementById('username').value);
        const p = document.getElementById('password').value;
        if(p.length < 6) return alert("La clave debe tener al menos 6 letras/números");
        
        auth.createUserWithEmailAndPassword(u, p)
            .then(() => alert("¡Usuario registrado con éxito!"))
            .catch(err => alert("Error: " + err.message));
    }

    function cerrarSesion() {
        auth.signOut().then(() => {
            // Limpiamos los campos para que el siguiente pueda escribir
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            alert("Sesión cerrada correctamente");
        });
    }

    function enviarMensaje() {
        const sala = document.getElementById('grupo-selector').value;
        const msg = sala + '|' + document.getElementById('mensaje-txt').value;
        if(msg.trim() !== "") {
            client.publish("proyecto/chat/" + sala + "/coman", msg);
            document.getElementById('mensaje-txt').value = "";
        }
    }
</script>
</body>
</html>
